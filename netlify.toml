[build]
  publish = "html"
  command = "python3 scripts/build_localities.py polling_stations_86.json && python3 generate_data.py polling_stations_86.json html/polling_stations_data.js && python3 scripts/generate_api_data.py polling_stations_86.json netlify/functions/_shared/api_stations_data.js && python3 scripts/generate_review_data.py && sed -i \"s/MAPS_API_KEY_PLACEHOLDER/$GOOGLE_MAPS_API_KEY/g\" html/polling_stations_map.html html/admin.html html/review_conflicts.html"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/stations/search"
  to = "/.netlify/functions/api-stations-search"
  status = 200
  force = true

[[redirects]]
  from = "/api/stations/nearby"
  to = "/.netlify/functions/api-stations-nearby"
  status = 200
  force = true

[[redirects]]
  from = "/api/localities"
  to = "/.netlify/functions/api-localities"
  status = 200
  force = true

[[redirects]]
  from = "/api/verdicts"
  to = "/.netlify/functions/get-verdicts"
  status = 200
  conditions = {Method = ["GET"]}
  force = true

[[redirects]]
  from = "/api/verdicts"
  to = "/.netlify/functions/save-verdicts"
  status = 200
  conditions = {Method = ["POST"]}
  force = true

[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/review_conflicts.html"
  [headers.values]
    X-Robots-Tag = "noindex"
