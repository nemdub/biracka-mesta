<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бирачка места — Избори 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/@googlemaps/markerclusterer@2/dist/index.umd.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; }
    #sidebar {
      width: 320px; min-width: 220px; max-width: 400px;
      display: flex; flex-direction: column;
      background: #1e1e2e; color: #cdd6f4;
      border-right: 1px solid #313244;
      resize: horizontal; overflow: auto;
    }
    #sidebar-header {
      padding: 14px 16px 10px;
      background: #181825;
      border-bottom: 1px solid #313244;
    }
    #sidebar-header h1 { font-size: 15px; font-weight: 700; color: #cba6f7; margin-bottom: 6px; }
    .stat-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .stat-chip {
      padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600;
    }
    .chip-total  { background: #313244; color: #cdd6f4; }
    .chip-mapped { background: #a6e3a1; color: #1e1e2e; }
    .chip-miss   { background: #f38ba8; color: #1e1e2e; }
    #toggle-btn {
      margin-top: 10px; width: 100%; padding: 7px 10px;
      border-radius: 8px; border: 1px solid #45475a;
      background: #313244; color: #cdd6f4;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    #toggle-btn:hover { background: #45475a; border-color: #cba6f7; }
    #toggle-btn.heatmap-active { background: #f9e2af22; border-color: #f9e2af; color: #f9e2af; }
    #search-wrap { padding: 10px 12px; background: #181825; border-bottom: 1px solid #313244; }
    #search {
      width: 100%; padding: 7px 10px; border-radius: 8px;
      border: 1px solid #45475a; background: #313244; color: #cdd6f4;
      font-size: 13px; outline: none;
    }
    #search:focus { border-color: #cba6f7; }
    #search::placeholder { color: #6c7086; }
    #community-list {
      flex: 1; overflow-y: auto;
      padding: 6px 0;
    }
    .comm-item {
      padding: 6px 16px; cursor: pointer; border-left: 3px solid transparent;
      transition: background 0.15s;
    }
    .comm-item:hover, .comm-item.active {
      background: #313244; border-left-color: #cba6f7;
    }
    .comm-name { font-weight: 600; font-size: 13px; }
    .comm-sub  { font-size: 11px; color: #6c7086; margin-top: 1px; }
    #map { flex: 1; }
    /* custom marker pins — all sizing/color is set inline */
    .map-pin { transition: transform 0.1s; }
    .map-pin:hover { transform: scale(1.4); }
    #note {
      position: fixed; bottom: 12px; right: 12px;
      background: #1e1e2e; color: #f9e2af; border: 1px solid #f9e2af;
      border-radius: 8px; padding: 8px 12px; font-size: 12px;
      max-width: 340px; z-index: 999; line-height: 1.4;
    }
    #note b { color: #cba6f7; }
    @media (max-width: 600px) {
      #sidebar { display: none; }
    }

    /* ── correction modal ─────────────────────────────────────────────────── */
    #correction-overlay {
      display: none; position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.72); align-items: center; justify-content: center;
    }
    #correction-overlay.open { display: flex; }
    #correction-modal {
      background: #1e1e2e; color: #cdd6f4; border: 1px solid #45475a;
      border-radius: 12px; width: min(560px, 95vw); max-height: 92vh;
      overflow-y: auto; padding: 24px; position: relative;
    }
    #correction-modal h2 { font-size: 15px; color: #cba6f7; margin-bottom: 16px; }
    #correction-modal label { display: block; font-size: 12px; color: #a6adc8; margin-bottom: 4px; margin-top: 12px; }
    #correction-modal input[type=text],
    #correction-modal textarea {
      width: 100%; padding: 8px 10px; border-radius: 8px;
      border: 1px solid #45475a; background: #313244; color: #cdd6f4;
      font-size: 13px; font-family: inherit; outline: none;
    }
    #correction-modal input[type=text]:focus,
    #correction-modal textarea:focus { border-color: #cba6f7; }
    #correction-modal textarea { resize: vertical; min-height: 60px; }
    #correction-modal .check-row {
      display: flex; align-items: center; gap: 8px; margin-top: 12px;
    }
    #correction-modal .check-row input[type=checkbox] { width: auto; }
    #picker-map { width: 100%; height: 220px; border-radius: 8px; margin-top: 8px; border: 1px solid #45475a; }
    #picker-hint { font-size: 11px; color: #6c7086; margin-top: 4px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
    #modal-submit-btn {
      flex: 1; padding: 10px; border-radius: 8px; border: none;
      background: #a6e3a1; color: #1e1e2e; font-weight: 700; font-size: 14px; cursor: pointer;
    }
    #modal-submit-btn:hover { background: #94d49e; }
    #modal-cancel-btn {
      padding: 10px 18px; border-radius: 8px; border: 1px solid #45475a;
      background: transparent; color: #cdd6f4; font-size: 14px; cursor: pointer;
    }
    #modal-cancel-btn:hover { background: #313244; }
    #modal-close-btn {
      position: absolute; top: 12px; right: 14px;
      background: none; border: none; color: #6c7086; font-size: 20px; cursor: pointer; line-height: 1;
    }
    #modal-close-btn:hover { color: #cdd6f4; }
    #modal-success { display: none; text-align: center; padding: 20px 0; }
    #modal-success .success-icon { font-size: 40px; margin-bottom: 10px; }
    #modal-success p { color: #a6e3a1; font-size: 15px; }

    /* ── station picker (shown only in "new location" mode) ─────────────── */
    #station-picker-section { margin-bottom: 4px; }
    #station-picker-section label { display: block; font-size: 12px; color: #a6adc8; margin-bottom: 4px; }
    #station-search-input {
      width: 100%; padding: 8px 10px; border-radius: 8px;
      border: 1px solid #45475a; background: #313244; color: #cdd6f4;
      font-size: 13px; outline: none;
    }
    #station-search-input:focus { border-color: #cba6f7; }
    #station-search-results {
      max-height: 180px; overflow-y: auto; margin-top: 4px;
      border: 1px solid #45475a; border-radius: 8px; background: #181825;
    }
    .station-result-item {
      padding: 7px 12px; cursor: pointer; border-bottom: 1px solid #313244;
      font-size: 12px;
    }
    .station-result-item:last-child { border-bottom: none; }
    .station-result-item:hover, .station-result-item.selected { background: #313244; }
    .station-result-item .sri-name { color: #cdd6f4; }
    .station-result-item .sri-comm { color: #6c7086; font-size: 11px; margin-top: 1px; }
    #station-picker-hint { font-size: 11px; color: #f9e2af; margin-top: 6px; display: none; }
    #picker-section { display: none; }

    /* ── suggest-location button for unmapped stations ───────────────────── */
    #suggest-location-btn {
      margin-top: 10px; width: 100%; padding: 7px 10px;
      border-radius: 8px; border: 1px solid #45475a;
      background: #313244; color: #89b4fa;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    #suggest-location-btn:hover { background: #45475a; border-color: #89b4fa; }

    /* ── script toggle ───────────────────────────────────────────────────── */
    #script-toggle {
      display: flex; border: 1px solid #45475a; border-radius: 10px;
      overflow: hidden; flex-shrink: 0;
    }
    .script-opt {
      padding: 2px 8px; font-size: 11px; font-weight: 700; cursor: pointer;
      background: transparent; border: none; color: #6c7086; line-height: 1.5;
    }
    .script-opt:hover { color: #cdd6f4; }
    .script-opt.active { background: #cba6f7; color: #1e1e2e; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
      <h1 data-i18n="Бирачка места 2026">Бирачка места 2026</h1>
      <div id="script-toggle" title="Промени писмо / Promeni pismo">
        <button class="script-opt active" data-script="cyr">Ћир</button>
        <button class="script-opt"        data-script="lat">Lat</button>
      </div>
    </div>
    <div class="stat-row">
      <span class="stat-chip chip-total" id="stat-total">…</span>
      <span class="stat-chip chip-mapped" id="stat-mapped">…</span>
      <span class="stat-chip chip-miss" id="stat-miss">…</span>
    </div>
    <button id="toggle-btn">🌡 <span data-i18n="Прикажи хит-мапу">Прикажи хит-мапу</span></button>
    <button id="suggest-location-btn">+ <span data-i18n="Предложи локацију">Предложи локацију</span></button>
  </div>
  <div id="search-wrap">
    <input id="search" type="text" data-i18n-ph="Претражи по општини или бирачком месту…"
           placeholder="Претражи по општини или бирачком месту…" autocomplete="off">
  </div>
  <div id="community-list"></div>
</div>

<div id="map"></div>

<!-- ── Correction / Location Suggestion Modal ───────────────────────────── -->
<div id="correction-overlay" role="dialog" aria-modal="true" aria-labelledby="correction-modal-title">
  <div id="correction-modal">
    <button id="modal-close-btn" aria-label="Затвори">&times;</button>
    <h2 id="correction-modal-title">📍 Предложи исправку локације</h2>

    <!-- success state (hidden until after submit) -->
    <div id="modal-success">
      <div class="success-icon">✅</div>
      <p data-i18n="Хвала! Ваш предлог је примљен и биће прегледан.">Хвала! Ваш предлог је примљен и биће прегледан.</p>
    </div>

    <!-- form state -->
    <div id="modal-form-wrap">
      <form id="correction-form" name="station-corrections" data-netlify="true" netlify-honeypot="bot-field">
        <!-- honeypot -->
        <p style="display:none"><label>Не попуњавати: <input name="bot-field"></label></p>
        <input type="hidden" name="form-name" value="station-corrections">
        <input type="hidden" name="station-id" id="field-station-id">
        <input type="hidden" name="community-id" id="field-community-id">
        <input type="hidden" name="station-name" id="field-station-name">
        <input type="hidden" name="community-name" id="field-community-name">
        <input type="hidden" name="current-lat" id="field-current-lat">
        <input type="hidden" name="current-lon" id="field-current-lon">
        <input type="hidden" name="new-lat" id="field-new-lat">
        <input type="hidden" name="new-lon" id="field-new-lon">

        <!-- Station picker — shown only when opened from sidebar button -->
        <div id="station-picker-section" style="display:none">
          <label><span data-i18n="Претражи бирачко место без координате">Претражи бирачко место без координате</span> <span style="color:#f38ba8">*</span></label>
          <input type="text" id="station-search-input"
                 data-i18n-ph="нпр. Основна школа, Нови Сад…"
                 placeholder="нпр. Основна школа, Нови Сад…" autocomplete="off">
          <div id="station-search-results"></div>
          <p id="station-picker-hint" data-i18n="⬆ Прво изаберите бирачко место из листе.">⬆ Прво изаберите бирачко место из листе.</p>
        </div>

        <!-- Station display — shown when station is known -->
        <div id="station-display-section">
          <label data-i18n="Бирачко место">Бирачко место</label>
          <input type="text" id="display-station-name" readonly style="opacity:0.6;cursor:default;">
          <label data-i18n="Општина">Општина</label>
          <input type="text" id="display-community-name" readonly style="opacity:0.6;cursor:default;">
        </div>

        <!-- Map picker — hidden until station is selected (in "new" mode) or always shown (in "correct" mode) -->
        <div id="picker-section">
          <label data-i18n="Кликните на мапи да поставите пин на тачну локацију">Кликните на мапи да поставите пин на тачну локацију</label>
          <div id="picker-map"></div>
          <p id="picker-hint">📌 <span data-i18n="Координате:">Координате:</span> <span id="picker-coords" data-i18n-val="нису изабране" data-i18n-val-lat="nisu izabrane">нису изабране</span></p>
        </div>

        <div class="check-row">
          <input type="checkbox" name="is-approx" id="field-is-approx" value="yes">
          <label for="field-is-approx" style="margin:0;" data-i18n="Локација је приближна">Локација је приближна</label>
        </div>

        <label for="field-comment" data-i18n="Коментар (опционално)">Коментар (опционално)</label>
        <textarea name="comment" id="field-comment"
                  data-i18n-ph="нпр. зграда је на углу улице…"
                  placeholder="нпр. зграда је на углу улице…"></textarea>

        <label for="field-submitter-name"><span data-i18n="Ваше имe">Ваше имe</span> <span style="color:#f38ba8">*</span></label>
        <input type="text" name="submitter-name" id="field-submitter-name" required
               data-i18n-ph="Ime i prezime" placeholder="Ime i prezime">

        <label for="field-submitter-contact"><span data-i18n="Контакт (e-mail или телефон)">Контакт (e-mail или телефон)</span> <span style="color:#f38ba8">*</span></label>
        <input type="text" name="submitter-contact" id="field-submitter-contact" required
               placeholder="email@primer.rs или +381…">

        <div class="modal-actions">
          <button type="button" id="modal-cancel-btn" data-i18n="Откажи">Откажи</button>
          <button type="submit" id="modal-submit-btn" data-i18n="Пошаљи предлог">Пошаљи предлог</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="polling_stations_data.js"></script>

<script>
// ── Serbian Cyrillic → Latin transliteration ──────────────────────────────────
// Digraphs must come before their component letters.
const CYR_LAT = [
  ['Љ','LJ'],['Њ','NJ'],['Џ','DŽ'],
  ['љ','lj'],['њ','nj'],['џ','dž'],
  ['А','A'],['Б','B'],['В','V'],['Г','G'],['Д','D'],['Ђ','Đ'],
  ['Е','E'],['Ж','Ž'],['З','Z'],['И','I'],['Ј','J'],['К','K'],
  ['Л','L'],['М','M'],['Н','N'],['О','O'],['П','P'],['Р','R'],
  ['С','S'],['Т','T'],['Ћ','Ć'],['У','U'],['Ф','F'],['Х','H'],
  ['Ц','C'],['Ч','Č'],['Ш','Š'],
  ['а','a'],['б','b'],['в','v'],['г','g'],['д','d'],['ђ','đ'],
  ['е','e'],['ж','ž'],['з','z'],['и','i'],['ј','j'],['к','k'],
  ['л','l'],['м','m'],['н','n'],['о','o'],['п','p'],['р','r'],
  ['с','s'],['т','t'],['ћ','ć'],['у','u'],['ф','f'],['х','h'],
  ['ц','c'],['ч','č'],['ш','š'],
];
function cyrToLat(str) {
  if (!str) return str;
  let r = str;
  for (const [c, l] of CYR_LAT) r = r.split(c).join(l);
  return r;
}

let currentScript = localStorage.getItem('srScript') || 'cyr';
// t() — transliterate a Cyrillic string if Latin mode is active
function t(cyrStr) { return currentScript === 'lat' ? cyrToLat(cyrStr) : cyrStr; }

// ── build flat index ──────────────────────────────────────────────────────────
const allStations = [];
for (const comm of DATA.communities) {
  for (const st of comm.polling_stations) {
    allStations.push({ ...st, communityName: comm.name, communityId: comm.id });
  }
}
const mapped   = allStations.filter(s => s.geo);
const unmapped = allStations.filter(s => !s.geo);

function updateStatChips() {
  document.getElementById('stat-total').textContent  = `${t('Укупно')}: ${allStations.length}`;
  document.getElementById('stat-mapped').textContent = `${t('На мапи')}: ${mapped.length}`;
  document.getElementById('stat-miss').textContent   = `${t('Без коорд')}: ${unmapped.length}`;
}
updateStatChips();

// ── voter count scale for pin sizing/color ────────────────────────────────────
// Use p5→p95 percentile range so mid-range stations spread across the full
// color/size scale instead of clustering at the low end due to outliers.
const voterCounts = mapped
  .filter(s => s.voter_count != null)
  .map(s => s.voter_count)
  .sort((a, b) => a - b);
const n = voterCounts.length;
const sqrtP5  = n ? Math.sqrt(voterCounts[Math.floor(n * 0.05)]) : 0;
const sqrtP95 = n ? Math.sqrt(voterCounts[Math.floor(n * 0.95)]) : 1;

function makeMarkerPin(voterCount, approx) {
  const div = document.createElement('div');
  div.className = 'map-pin';
  let size, bg;
  if (voterCount == null) {
    size = 8;
    bg   = 'rgba(148,163,184,0.75)'; // slate-grey for unknown
  } else {
    const t = Math.max(0, Math.min(1, (Math.sqrt(voterCount) - sqrtP5) / (sqrtP95 - sqrtP5)));
    size = Math.round(6 + t * 18);                        // 6px → 24px
    bg   = `hsl(${Math.round(120 - t * 120)},85%,50%)`; // green → yellow → red
  }
  // Set every property individually — cssText can silently drop rules on parse errors
  div.style.display      = 'inline-block';
  div.style.width        = `${size}px`;
  div.style.height       = `${size}px`;
  div.style.borderRadius = '50%';
  div.style.background   = bg;
  div.style.border       = approx ? '1.5px dashed rgba(255,255,255,0.9)' : '1.5px solid rgba(255,255,255,0.8)';
  div.style.opacity      = approx ? '0.65' : '0.9';
  div.style.cursor       = 'pointer';
  return div;
}

// ── sidebar community list ────────────────────────────────────────────────────
const commList = document.getElementById('community-list');

function buildCommunityList(filter) {
  commList.innerHTML = '';
  const q = (filter || '').toLowerCase().trim();
  for (const comm of DATA.communities) {
    // match against whichever script is currently active
    const commDisp  = t(comm.name);
    const nameMatch = commDisp.toLowerCase().includes(q);
    const stations  = comm.polling_stations.filter(s =>
      !q || nameMatch || t(s.name).toLowerCase().includes(q)
    );
    if (q && stations.length === 0) continue;

    const mappedCount = stations.filter(s => s.geo).length;
    const div = document.createElement('div');
    div.className = 'comm-item';
    div.dataset.communityId = comm.id;
    div.innerHTML = `<div class="comm-name">${commDisp}</div>
      <div class="comm-sub">${stations.length} ${t('места')} · ${mappedCount} ${t('на мапи')}</div>`;
    div.addEventListener('click', () => flyToCommunit(comm.id));
    commList.appendChild(div);
  }
}
buildCommunityList('');

// ── Google Maps init ──────────────────────────────────────────────────────────
let map, clusterer, infoWindow, heatmap;
let allMarkers = [];
let visibleSet = new Set();
let isHeatmap  = false;

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 44.0, lng: 21.0 },
    zoom: 7,
    mapId: '54effe4e315972c324bfa3ce',
    gestureHandling: 'greedy',
    mapTypeControl: true,
    streetViewControl: true,
    fullscreenControlOptions: { position: google.maps.ControlPosition.TOP_RIGHT },
  });

  infoWindow = new google.maps.InfoWindow();

  // ── markers ────────────────────────────────────────────────────────────────
  allMarkers = mapped.map((st, i) => {
    const marker = new google.maps.marker.AdvancedMarkerElement({
      position: { lat: st.geo.lat, lng: st.geo.lon },
      title: st.name,
      content: makeMarkerPin(st.voter_count, st.geo_approx),
    });
    // store voter_count on the marker so the cluster renderer can read it
    marker._voterCount = st.voter_count ?? 0;
    marker.addListener('gmp-click', () => {
      const numberRow = st.number != null
        ? `<span style="color:#888;font-size:12px;">${t('Бирачко место бр.')} <b>${st.number}</b> · </span>`
        : '';
      const voterRow = st.voter_count != null
        ? `<span style="color:#888;font-size:12px;">${t('Бирача')}: <b>${st.voter_count.toLocaleString('sr-RS')}</b></span>`
        : '';
      const approxRow = st.geo_approx
        ? `<br><span style="color:#b45309;font-size:11px;">⚠ ${t('Приближна локација')}</span>`
        : '';
      const sourceRow = st.geo_source
        ? `<br><span style="color:#888;font-size:11px;">${t('Извор координата')}: ${st.geo_source}</span>`
        : '';
      const stIdx = i; // capture for closure
      infoWindow.setContent(`
        <div style="max-width:260px;font-family:sans-serif;">
          <b style="font-size:13px;">${t(st.name)}</b><br>
          <span style="color:#888;font-size:12px;">${t(st.communityName)}</span><br>
          ${numberRow}${voterRow}${approxRow}${sourceRow}
          <br><a href="#" id="iw-suggest-${stIdx}" style="font-size:11px;color:#1a73e8;text-decoration:none;">📍 ${t('Предложи исправку')}</a>
        </div>`);
      // attach click after infoWindow renders
      google.maps.event.addListenerOnce(infoWindow, 'domready', () => {
        const link = document.getElementById(`iw-suggest-${stIdx}`);
        if (link) link.addEventListener('click', ev => {
          ev.preventDefault();
          infoWindow.close();
          window.openCorrectionModal(st);
        });
      });
      infoWindow.open(map, marker);
    });
    visibleSet.add(i);
    return marker;
  });

  // ── cluster renderer — color/size reflect aggregated voter count ───────────
  const clusterRenderer = {
    render({ count, position, markers }) {
      const totalVoters = markers.reduce((s, m) => s + (m._voterCount || 0), 0);
      const avgVoters   = totalVoters / count;
      const t = Math.max(0, Math.min(1, (Math.sqrt(avgVoters) - sqrtP5) / (sqrtP95 - sqrtP5)));
      const hue  = Math.round(120 - t * 120);           // green → yellow → red
      const size = Math.round(22 + Math.sqrt(count) * 3); // grows with cluster size

      const div = document.createElement('div');
      div.style.display        = 'flex';
      div.style.alignItems     = 'center';
      div.style.justifyContent = 'center';
      div.style.width          = `${size}px`;
      div.style.height         = `${size}px`;
      div.style.borderRadius   = '50%';
      div.style.background     = `hsl(${hue},85%,45%)`;
      div.style.border         = '2px solid rgba(255,255,255,0.9)';
      div.style.boxShadow      = '0 1px 5px rgba(0,0,0,0.45)';
      div.style.color          = '#fff';
      div.style.fontWeight     = '700';
      div.style.fontSize       = `${Math.max(9, Math.round(size * 0.38))}px`;
      div.style.cursor         = 'pointer';
      div.textContent          = count;

      return new google.maps.marker.AdvancedMarkerElement({
        position,
        content: div,
        zIndex: count,
      });
    }
  };

  clusterer = new markerClusterer.MarkerClusterer({ map, markers: allMarkers, renderer: clusterRenderer });

  // ── heatmap ────────────────────────────────────────────────────────────────
  const heatPoints = mapped
    .filter(s => s.voter_count != null)
    .map(s => ({ location: new google.maps.LatLng(s.geo.lat, s.geo.lon), weight: s.voter_count }));

  heatmap = new google.maps.visualization.HeatmapLayer({
    data: heatPoints,
    map: null,
    radius: 25,
    opacity: 0.75,
  });

  // ── toggle button ──────────────────────────────────────────────────────────
  document.getElementById('toggle-btn').addEventListener('click', toggleView);
}

window.initMap = initMap;

function toggleView() {
  isHeatmap = !isHeatmap;
  const btn = document.getElementById('toggle-btn');
  if (isHeatmap) {
    clusterer.clearMarkers();
    heatmap.setMap(map);
    const span = btn.querySelector('[data-i18n]');
    span.setAttribute('data-i18n', 'Прикажи маркере');
    span.textContent = t('Прикажи маркере');
    btn.childNodes[0].textContent = '📍 ';
    btn.classList.add('heatmap-active');
  } else {
    heatmap.setMap(null);
    const span = btn.querySelector('[data-i18n]');
    span.setAttribute('data-i18n', 'Прикажи хит-мапу');
    span.textContent = t('Прикажи хит-мапу');
    btn.childNodes[0].textContent = '🌡 ';
    btn.classList.remove('heatmap-active');
    // re-apply current filter to restore markers
    applyFilter(document.getElementById('search').value);
  }
}

// ── search / filter ───────────────────────────────────────────────────────────
let filterTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(filterTimer);
  filterTimer = setTimeout(() => applyFilter(e.target.value), 200);
});

function applyFilter(q) {
  q = q.toLowerCase().trim();
  buildCommunityList(q);

  if (!clusterer) return;

  const matchFn = st => !q
    || t(st.name).toLowerCase().includes(q)
    || t(st.communityName).toLowerCase().includes(q);

  if (isHeatmap) {
    const points = mapped
      .filter(s => s.voter_count != null && matchFn(s))
      .map(s => ({ location: new google.maps.LatLng(s.geo.lat, s.geo.lon), weight: s.voter_count }));
    heatmap.setData(points);
  } else {
    const toShow = [];
    visibleSet.clear();
    mapped.forEach((st, i) => {
      if (matchFn(st)) { toShow.push(allMarkers[i]); visibleSet.add(i); }
    });
    clusterer.clearMarkers();
    clusterer.addMarkers(toShow);
  }
}

// ── fly to community ──────────────────────────────────────────────────────────
function flyToCommunit(communityId) {
  if (!map) return;
  const pts = mapped.filter(s => s.communityId === communityId);
  if (pts.length === 0) return;

  const bounds = new google.maps.LatLngBounds();
  pts.forEach(s => bounds.extend({ lat: s.geo.lat, lng: s.geo.lon }));
  map.fitBounds(bounds, 60);

  document.querySelectorAll('.comm-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.comm-item[data-community-id="${communityId}"]`);
  if (el) el.classList.add('active');
}
</script>

<!-- ── Correction Modal Logic ────────────────────────────────────────────── -->
<script>
(function() {
  const overlay        = document.getElementById('correction-overlay');
  const formWrap       = document.getElementById('modal-form-wrap');
  const successEl      = document.getElementById('modal-success');
  const form           = document.getElementById('correction-form');
  const pickerSection  = document.getElementById('picker-section');
  const stPickerSec    = document.getElementById('station-picker-section');
  const stDisplaySec   = document.getElementById('station-display-section');
  const stPickerHint   = document.getElementById('station-picker-hint');
  const stSearchInput  = document.getElementById('station-search-input');
  const stResultsList  = document.getElementById('station-search-results');
  let pickerMap, pickerMarker;
  let newLocationMode = false; // true when opened from sidebar button

  // ── station picker logic (new-location mode) ───────────────────────────────
  function renderStationResults(query) {
    const q = query.toLowerCase().trim();
    stResultsList.innerHTML = '';
    if (!q) return;
    const matches = unmapped.filter(s =>
      t(s.name).toLowerCase().includes(q) || t(s.communityName).toLowerCase().includes(q)
    ).slice(0, 40);
    matches.forEach(st => {
      const item = document.createElement('div');
      item.className = 'station-result-item';
      item.innerHTML = `<div class="sri-name">${t(st.name)}</div><div class="sri-comm">${t(st.communityName)}</div>`;
      item.addEventListener('click', () => selectUnmappedStation(st));
      stResultsList.appendChild(item);
    });
    if (matches.length === 0) {
      stResultsList.innerHTML = `<div class="station-result-item" style="color:#6c7086;cursor:default;">${t('Нема резултата.')}</div>`;
    }
  }

  function selectUnmappedStation(st) {
    fillStationFields(st);
    stResultsList.innerHTML = '';
    stSearchInput.value = '';
    stPickerHint.style.display = 'none';
    // show station name + community name
    stDisplaySec.style.display = 'block';
    // show picker section BEFORE creating/resizing the map — container must have
    // non-zero dimensions or the map renders blank
    pickerSection.style.display = 'block';
    if (pickerMarker) { pickerMarker.map = null; pickerMarker = null; }
    document.getElementById('picker-coords').textContent = t('нису изабране');
    document.getElementById('field-new-lat').value = '';
    document.getElementById('field-new-lon').value = '';
    if (!pickerMap) {
      pickerMap = new google.maps.Map(document.getElementById('picker-map'), {
        center: { lat: 44.0, lng: 21.0 }, zoom: 7,
        mapId: '54effe4e315972c324bfa3ce',
        gestureHandling: 'greedy',
        mapTypeControl: false, streetViewControl: false, fullscreenControl: false,
      });
      pickerMap.addListener('click', e => placePickerPin(e.latLng));
    } else {
      google.maps.event.trigger(pickerMap, 'resize');
      pickerMap.setCenter({ lat: 44.0, lng: 21.0 });
      pickerMap.setZoom(7);
    }
  }

  stSearchInput.addEventListener('input', e => renderStationResults(e.target.value));

  // ── fill hidden + display fields ───────────────────────────────────────────
  function fillStationFields(st) {
    document.getElementById('field-station-id').value     = st.id    || '';
    document.getElementById('field-community-id').value   = st.communityId || '';
    document.getElementById('field-station-name').value   = st.name  || '';
    document.getElementById('field-community-name').value = st.communityName || '';
    document.getElementById('field-current-lat').value    = st.geo ? st.geo.lat : '';
    document.getElementById('field-current-lon').value    = st.geo ? st.geo.lon : '';
    document.getElementById('display-station-name').value    = st.name || '';
    document.getElementById('display-community-name').value  = st.communityName || '';
  }

  // ── openModal ──────────────────────────────────────────────────────────────
  // mode: 'correct' — opened from info window (station with known coords)
  //       'new'     — opened from sidebar button (user picks station + location)
  function openModal(station, mode) {
    newLocationMode = (mode === 'new');
    document.getElementById('field-new-lat').value       = '';
    document.getElementById('field-new-lon').value       = '';
    document.getElementById('field-comment').value       = '';
    document.getElementById('field-submitter-name').value   = '';
    document.getElementById('field-submitter-contact').value= '';
    document.getElementById('field-is-approx').checked      = false;

    if (newLocationMode) {
      // clear station fields — user must pick from search
      fillStationFields({ id:'', communityId:'', name:'', communityName:'', geo: null });
      stPickerSec.style.display   = '';
      stDisplaySec.style.display  = 'none';
      pickerSection.style.display = 'none'; // shown after station is chosen
      stPickerHint.style.display  = '';
      stSearchInput.value         = '';
      stResultsList.innerHTML     = '';
      document.getElementById('correction-modal-title').textContent = '📍 Предложи локацију';
    } else {
      fillStationFields(station);
      stPickerSec.style.display   = 'none';
      stDisplaySec.style.display  = '';
      pickerSection.style.display = 'block';
      document.getElementById('picker-coords').textContent = 'нису изабране';
      document.getElementById('correction-modal-title').textContent = '📍 Предложи исправку локације';
    }

    formWrap.style.display  = '';
    successEl.style.display = 'none';
    overlay.classList.add('open');

    // In 'new' mode the picker section is hidden until a station is chosen —
    // map init is deferred to selectUnmappedStation() so it gets a visible container.
    if (!newLocationMode) {
      const startPos  = station.geo ? { lat: station.geo.lat, lng: station.geo.lon } : { lat: 44.0, lng: 21.0 };
      const startZoom = station.geo ? 16 : 7;
      if (!pickerMap) {
        pickerMap = new google.maps.Map(document.getElementById('picker-map'), {
          center: startPos, zoom: startZoom,
          mapId: '54effe4e315972c324bfa3ce',
          gestureHandling: 'greedy',
          mapTypeControl: false, streetViewControl: false, fullscreenControl: false,
        });
        pickerMap.addListener('click', e => placePickerPin(e.latLng));
      } else {
        pickerMap.setCenter(startPos);
        pickerMap.setZoom(startZoom);
        if (pickerMarker) { pickerMarker.map = null; pickerMarker = null; }
      }
      if (station.geo) {
        placePickerPin(new google.maps.LatLng(station.geo.lat, station.geo.lon));
      }
    } else {
      // clear any leftover marker from a previous session
      if (pickerMarker) { pickerMarker.map = null; pickerMarker = null; }
    }
  }

  function placePickerPin(latLng) {
    if (pickerMarker) pickerMarker.map = null;
    const pin = document.createElement('div');
    pin.style.cssText = 'width:14px;height:14px;border-radius:50%;background:#f38ba8;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.5);';
    pickerMarker = new google.maps.marker.AdvancedMarkerElement({
      position: latLng, map: pickerMap, content: pin,
    });
    const lat = latLng.lat().toFixed(6);
    const lng = latLng.lng().toFixed(6);
    document.getElementById('field-new-lat').value       = lat;
    document.getElementById('field-new-lon').value       = lng;
    document.getElementById('picker-coords').textContent = `${lat}, ${lng}`;
  }

  function closeModal() { overlay.classList.remove('open'); }

  document.getElementById('modal-close-btn').addEventListener('click', closeModal);
  document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

  // form submit
  form.addEventListener('submit', async e => {
    e.preventDefault();
    if (newLocationMode && !document.getElementById('field-station-id').value) {
      alert('Молимо прво изаберите бирачко место из листе.');
      return;
    }
    const newLat = document.getElementById('field-new-lat').value;
    const newLon = document.getElementById('field-new-lon').value;
    if (!newLat || !newLon) {
      alert('Молимо кликните на мапи да изаберете локацију.');
      return;
    }
    const data = new FormData(form);
    try {
      const resp = await fetch('/', { method: 'POST', body: data });
      if (resp.ok) {
        formWrap.style.display  = 'none';
        successEl.style.display = '';
      } else {
        alert('Грешка при слању. Покушајте поново.');
      }
    } catch (err) {
      alert('Грешка при слању. Проверите интернет везу.');
    }
  });

  // expose globally for marker click handlers
  window.openCorrectionModal = (st) => openModal(st, 'correct');

  // ── script toggle (Ћир / Lat) ──────────────────────────────────────────────
  function applyScript(script) {
    currentScript = script;
    localStorage.setItem('srScript', script);

    // update toggle button states
    document.querySelectorAll('.script-opt').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.script === script);
    });

    // update data-i18n text nodes
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.getAttribute('data-i18n'));
    });

    // update data-i18n-ph placeholders
    document.querySelectorAll('[data-i18n-ph]').forEach(el => {
      el.placeholder = t(el.getAttribute('data-i18n-ph'));
    });

    // update picker-coords default text (only if coords not yet chosen)
    const coordsEl = document.getElementById('picker-coords');
    if (coordsEl && coordsEl.dataset.i18nVal) {
      const noCoords = t(coordsEl.getAttribute('data-i18n-val'));
      // only reset if it still shows the default (not real coordinates)
      if (!/\d/.test(coordsEl.textContent)) coordsEl.textContent = noCoords;
    }

    // update lang attribute for accessibility
    document.documentElement.lang = script === 'lat' ? 'sr-Latn' : 'sr';

    // rebuild dynamic content
    updateStatChips();
    buildCommunityList(document.getElementById('search').value);
    if (typeof infoWindow !== 'undefined' && infoWindow) infoWindow.close();
  }

  // init toggle state on load
  applyScript(currentScript);

  document.querySelectorAll('.script-opt').forEach(btn => {
    btn.addEventListener('click', () => applyScript(btn.dataset.script));
  });

  // sidebar button — user picks both station and location
  document.getElementById('suggest-location-btn').addEventListener('click', () => {
    openModal(null, 'new');
  });
})();
</script>
