<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Бирачка места</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px;
           background: #1e1e2e; color: #cdd6f4; height: 100vh; display: flex; flex-direction: column; }

    /* ── login overlay ─────────────────────────────────────────────────────── */
    #login-overlay {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
    }
    #login-overlay.open { display: flex; }
    #login-box {
      background: #1e1e2e; border: 1px solid #45475a; border-radius: 12px;
      padding: 32px; width: min(380px, 90vw); text-align: center;
    }
    #login-box h1 { font-size: 17px; color: #cba6f7; margin-bottom: 20px; }
    #login-box input {
      width: 100%; padding: 10px 12px; border-radius: 8px;
      border: 1px solid #45475a; background: #313244; color: #cdd6f4;
      font-size: 14px; outline: none; margin-bottom: 12px;
    }
    #login-box input:focus { border-color: #cba6f7; }
    #login-btn {
      width: 100%; padding: 10px; border-radius: 8px; border: none;
      background: #cba6f7; color: #1e1e2e; font-weight: 700; font-size: 14px; cursor: pointer;
    }
    #login-btn:hover { background: #b793e0; }
    #login-error { color: #f38ba8; font-size: 12px; margin-top: 8px; display: none; }

    /* ── main layout ────────────────────────────────────────────────────────── */
    #top-bar {
      padding: 10px 16px; background: #181825; border-bottom: 1px solid #313244;
      display: flex; align-items: center; gap: 12px;
    }
    #top-bar h1 { font-size: 14px; color: #cba6f7; font-weight: 700; flex: 1; }
    #logout-btn {
      padding: 5px 12px; border-radius: 6px; border: 1px solid #45475a;
      background: transparent; color: #6c7086; font-size: 12px; cursor: pointer;
    }
    #logout-btn:hover { background: #313244; color: #cdd6f4; }
    #refresh-btn {
      padding: 5px 12px; border-radius: 6px; border: 1px solid #45475a;
      background: #313244; color: #cdd6f4; font-size: 12px; cursor: pointer;
    }
    #refresh-btn:hover { background: #45475a; }

    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── left panel — submission list ─────────────────────────────────────── */
    #sub-list-panel {
      width: 300px; min-width: 220px; border-right: 1px solid #313244;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #sub-list-header {
      padding: 10px 14px; background: #181825; border-bottom: 1px solid #313244;
      font-size: 12px; color: #6c7086;
    }
    #sub-list { flex: 1; overflow-y: auto; }
    .sub-item {
      padding: 10px 14px; border-bottom: 1px solid #313244; cursor: pointer;
      border-left: 3px solid transparent; transition: background 0.1s;
    }
    .sub-item:hover { background: #313244; }
    .sub-item.active { background: #313244; border-left-color: #cba6f7; }
    .sub-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sub-meta { font-size: 11px; color: #6c7086; margin-top: 2px; }
    #empty-msg { padding: 20px; color: #6c7086; font-size: 13px; text-align: center; }
    #loading-msg { padding: 20px; color: #6c7086; font-size: 13px; text-align: center; }

    /* ── right panel — detail ──────────────────────────────────────────────── */
    #detail-panel {
      flex: 1; overflow-y: auto; padding: 20px 24px;
    }
    #detail-empty { color: #6c7086; font-size: 13px; padding-top: 40px; text-align: center; }
    #detail-content { display: none; }
    .detail-section { margin-bottom: 20px; }
    .detail-section h3 { font-size: 12px; color: #6c7086; text-transform: uppercase;
                         letter-spacing: 0.8px; margin-bottom: 8px; border-bottom: 1px solid #313244; padding-bottom: 4px; }
    .detail-row { display: flex; gap: 16px; margin-bottom: 6px; }
    .detail-label { font-size: 12px; color: #6c7086; width: 130px; flex-shrink: 0; }
    .detail-value { font-size: 13px; color: #cdd6f4; }
    .coord-box {
      display: inline-block; padding: 3px 8px; border-radius: 6px;
      background: #313244; font-size: 12px; font-family: monospace; color: #89b4fa;
    }
    .coord-new { background: #1e3a1e; color: #a6e3a1; }
    #preview-map { width: 100%; height: 240px; border-radius: 8px; border: 1px solid #45475a; margin-top: 8px; }

    .action-row { display: flex; gap: 12px; margin-top: 20px; }
    #accept-btn {
      flex: 1; padding: 12px; border-radius: 8px; border: none;
      background: #a6e3a1; color: #1e1e2e; font-weight: 700; font-size: 14px; cursor: pointer;
    }
    #accept-btn:hover:not(:disabled) { background: #94d49e; }
    #reject-btn {
      flex: 1; padding: 12px; border-radius: 8px; border: none;
      background: #f38ba8; color: #1e1e2e; font-weight: 700; font-size: 14px; cursor: pointer;
    }
    #reject-btn:hover:not(:disabled) { background: #e07a95; }
    #accept-btn:disabled, #reject-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #action-status { margin-top: 10px; font-size: 13px; min-height: 20px; }
    .status-ok  { color: #a6e3a1; }
    .status-err { color: #f38ba8; }
  </style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay" class="open">
  <div id="login-box">
    <h1>Admin pristup</h1>
    <input type="password" id="token-input" placeholder="Admin token" autocomplete="current-password">
    <button id="login-btn">Пријави се</button>
    <div id="login-error">Погрешан токен. Покушајте поново.</div>
  </div>
</div>

<div id="top-bar">
  <h1>Бирачка места — Admin</h1>
  <button id="refresh-btn">⟳ Освежи</button>
  <button id="logout-btn">Одјави се</button>
</div>

<div id="main">
  <!-- Left: submission list -->
  <div id="sub-list-panel">
    <div id="sub-list-header">Предлози за исправку</div>
    <div id="sub-list">
      <div id="loading-msg">Учитавање…</div>
      <div id="empty-msg" style="display:none">Нема предлога.</div>
    </div>
  </div>

  <!-- Right: detail view -->
  <div id="detail-panel">
    <div id="detail-empty">Изаберите предлог из листе.</div>
    <div id="detail-content">
      <div class="detail-section">
        <h3>Бирачко место</h3>
        <div class="detail-row"><span class="detail-label">Назив</span><span class="detail-value" id="d-station-name"></span></div>
        <div class="detail-row"><span class="detail-label">Општина</span><span class="detail-value" id="d-community-name"></span></div>
        <div class="detail-row"><span class="detail-label">ID</span><span class="detail-value" id="d-station-id" style="font-size:11px;color:#6c7086;"></span></div>
      </div>

      <div class="detail-section">
        <h3>Координате</h3>
        <div class="detail-row">
          <span class="detail-label">Тренутне</span>
          <span class="detail-value"><span class="coord-box" id="d-current-coords">—</span></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Предложене</span>
          <span class="detail-value"><span class="coord-box coord-new" id="d-new-coords">—</span></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Приближна</span>
          <span class="detail-value" id="d-is-approx"></span>
        </div>
        <div id="preview-map"></div>
      </div>

      <div class="detail-section">
        <h3>Подносилац</h3>
        <div class="detail-row"><span class="detail-label">Ime</span><span class="detail-value" id="d-submitter-name"></span></div>
        <div class="detail-row"><span class="detail-label">Контакт</span><span class="detail-value" id="d-submitter-contact"></span></div>
        <div class="detail-row"><span class="detail-label">Коментар</span><span class="detail-value" id="d-comment"></span></div>
        <div class="detail-row"><span class="detail-label">Datum</span><span class="detail-value" id="d-date"></span></div>
      </div>

      <div class="action-row">
        <button id="accept-btn">✓ Прихвати</button>
        <button id="reject-btn">✗ Одбиј</button>
      </div>
      <div id="action-status"></div>
    </div>
  </div>
</div>

<script>
// ── auth ────────────────────────────────────────────────────────────────────
const loginOverlay = document.getElementById('login-overlay');
const loginError   = document.getElementById('login-error');
let adminToken     = localStorage.getItem('adminToken') || '';

function tryLogin() {
  const val = document.getElementById('token-input').value.trim();
  if (!val) return;
  adminToken = val;
  localStorage.setItem('adminToken', val);
  loginOverlay.classList.remove('open');
  loginError.style.display = 'none';
  loadSubmissions();
}

document.getElementById('login-btn').addEventListener('click', tryLogin);
document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryLogin();
});
document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem('adminToken');
  adminToken = '';
  loginOverlay.classList.add('open');
});

if (adminToken) {
  loginOverlay.classList.remove('open');
  loadSubmissions();
}

// ── submissions ──────────────────────────────────────────────────────────────
let submissions = [];
let selected    = null;
let previewMap, currentMarker, suggestedMarker;

async function loadSubmissions() {
  const listEl   = document.getElementById('sub-list');
  const loadMsg  = document.getElementById('loading-msg');
  const emptyMsg = document.getElementById('empty-msg');
  loadMsg.style.display  = '';
  emptyMsg.style.display = 'none';
  // remove existing items
  listEl.querySelectorAll('.sub-item').forEach(el => el.remove());

  try {
    const resp = await fetch('/.netlify/functions/get-submissions', {
      headers: { 'X-Admin-Token': adminToken }
    });
    if (resp.status === 401) {
      loginError.style.display = 'block';
      loginError.textContent   = 'Неважећи токен.';
      loginOverlay.classList.add('open');
      loadMsg.style.display = 'none';
      return;
    }
    const data = await resp.json();
    submissions = data;
    loadMsg.style.display = 'none';
    if (submissions.length === 0) {
      emptyMsg.style.display = '';
      return;
    }
    submissions.forEach((sub, idx) => {
      const d   = new Date(sub.created_at);
      const row = document.createElement('div');
      row.className      = 'sub-item';
      row.dataset.idx    = idx;
      row.innerHTML      = `<div class="sub-name">${esc(sub.data['station-name'] || '(непознато)')}</div>
        <div class="sub-meta">${esc(sub.data['community-name'] || '')} · ${d.toLocaleDateString('sr-Latn')}</div>
        <div class="sub-meta">${esc(sub.data['submitter-name'] || '')}</div>`;
      row.addEventListener('click', () => selectSubmission(idx));
      listEl.appendChild(row);
    });
  } catch (err) {
    loadMsg.textContent = 'Грешка при учитавању: ' + err.message;
  }
}

document.getElementById('refresh-btn').addEventListener('click', () => {
  selected = null;
  document.getElementById('detail-empty').style.display   = '';
  document.getElementById('detail-content').style.display = 'none';
  loadSubmissions();
});

function selectSubmission(idx) {
  selected = submissions[idx];
  document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.sub-item[data-idx="${idx}"]`).classList.add('active');
  renderDetail(selected);
}

function renderDetail(sub) {
  const d = sub.data;
  document.getElementById('detail-empty').style.display   = 'none';
  document.getElementById('detail-content').style.display = 'block';

  document.getElementById('d-station-name').textContent    = d['station-name']      || '—';
  document.getElementById('d-community-name').textContent  = d['community-name']    || '—';
  document.getElementById('d-station-id').textContent      = `station: ${d['station-id']} · community: ${d['community-id']}`;
  document.getElementById('d-current-coords').textContent  = d['current-lat'] && d['current-lon']
    ? `${d['current-lat']}, ${d['current-lon']}` : '—';
  document.getElementById('d-new-coords').textContent      = d['new-lat'] && d['new-lon']
    ? `${d['new-lat']}, ${d['new-lon']}` : '—';
  document.getElementById('d-is-approx').textContent       = d['is-approx'] === 'yes' ? 'Да' : 'Не';
  document.getElementById('d-submitter-name').textContent  = d['submitter-name']    || '—';
  document.getElementById('d-submitter-contact').textContent = d['submitter-contact'] || '—';
  document.getElementById('d-comment').textContent         = d['comment']           || '—';
  document.getElementById('d-date').textContent            = new Date(sub.created_at).toLocaleString('sr-Latn');

  document.getElementById('action-status').textContent = '';
  document.getElementById('accept-btn').disabled = false;
  document.getElementById('reject-btn').disabled = false;

  // preview map
  const newLat = parseFloat(d['new-lat']);
  const newLon = parseFloat(d['new-lon']);
  const curLat = parseFloat(d['current-lat']);
  const curLon = parseFloat(d['current-lon']);
  const center = !isNaN(newLat) ? { lat: newLat, lng: newLon }
               : !isNaN(curLat) ? { lat: curLat, lng: curLon }
               : { lat: 44.0, lng: 21.0 };
  const zoom   = (!isNaN(newLat) || !isNaN(curLat)) ? 15 : 7;

  if (!previewMap) {
    previewMap = new google.maps.Map(document.getElementById('preview-map'), {
      center, zoom, mapId: '54effe4e315972c324bfa3ce',
      gestureHandling: 'greedy', mapTypeControl: false,
      streetViewControl: false, fullscreenControl: false,
    });
  } else {
    previewMap.setCenter(center);
    previewMap.setZoom(zoom);
  }
  if (currentMarker)   { currentMarker.map   = null; currentMarker   = null; }
  if (suggestedMarker) { suggestedMarker.map = null; suggestedMarker = null; }

  if (!isNaN(curLat) && !isNaN(curLon)) {
    const pin = document.createElement('div');
    pin.style.cssText = 'width:12px;height:12px;border-radius:50%;background:#89b4fa;border:2px solid #fff;';
    currentMarker = new google.maps.marker.AdvancedMarkerElement({
      position: { lat: curLat, lng: curLon }, map: previewMap, content: pin,
      title: 'Тренутна локација',
    });
  }
  if (!isNaN(newLat) && !isNaN(newLon)) {
    const pin = document.createElement('div');
    pin.style.cssText = 'width:14px;height:14px;border-radius:50%;background:#f38ba8;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.5);';
    suggestedMarker = new google.maps.marker.AdvancedMarkerElement({
      position: { lat: newLat, lng: newLon }, map: previewMap, content: pin,
      title: 'Предложена локација',
    });
  }
}

// ── actions ──────────────────────────────────────────────────────────────────
document.getElementById('accept-btn').addEventListener('click', () => processAction('accept'));
document.getElementById('reject-btn').addEventListener('click', () => processAction('reject'));

async function processAction(action) {
  if (!selected) return;
  const d = selected.data;
  const statusEl = document.getElementById('action-status');
  document.getElementById('accept-btn').disabled = true;
  document.getElementById('reject-btn').disabled = true;
  statusEl.textContent  = action === 'accept' ? 'Прихватање…' : 'Одбијање…';
  statusEl.className    = '';

  try {
    const resp = await fetch('/.netlify/functions/process-correction', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Token': adminToken },
      body: JSON.stringify({
        submissionId: selected.id,
        action,
        stationId:   d['station-id'],
        communityId: d['community-id'],
        newLat:      d['new-lat'],
        newLon:      d['new-lon'],
        isApprox:    d['is-approx'] === 'yes',
      }),
    });
    const result = await resp.json();
    if (result.ok) {
      statusEl.textContent = action === 'accept' ? '✓ Прихваћено. GitHub commit sent.' : '✓ Одбијено.';
      statusEl.className   = 'status-ok';
      // remove from local list
      submissions = submissions.filter(s => s.id !== selected.id);
      selected = null;
      document.getElementById('detail-empty').style.display   = '';
      document.getElementById('detail-content').style.display = 'none';
      document.querySelectorAll('.sub-item').forEach(el => {
        if (parseInt(el.dataset.idx, 10) !== undefined) {
          // refresh list
        }
      });
      setTimeout(loadSubmissions, 600);
    } else {
      statusEl.textContent = 'Грешка: ' + (result.error || 'Непозната грешка');
      statusEl.className   = 'status-err';
      document.getElementById('accept-btn').disabled = false;
      document.getElementById('reject-btn').disabled = false;
    }
  } catch (err) {
    statusEl.textContent = 'Грешка: ' + err.message;
    statusEl.className   = 'status-err';
    document.getElementById('accept-btn').disabled = false;
    document.getElementById('reject-btn').disabled = false;
  }
}

// ── utils ────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>

<script>window.initAdminMap = function() {};</script>
<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=MAPS_API_KEY_PLACEHOLDER&libraries=marker&loading=async&callback=initAdminMap">
</script>

</body>
</html>
